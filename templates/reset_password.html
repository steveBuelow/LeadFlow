{% extends "_layout.html" %}
{% block title %}Reset Password — LeadFlow{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-eyebrow">Secure CRM</div>
    <h1 class="auth-title" id="reset-title">Set new password</h1>
    <p class="auth-copy" id="reset-copy">Choose a strong password for your account.</p>

    <form id="reset-form" novalidate>
      <div class="form-group">
        <label class="label" for="reset-password">New password</label>
        <input class="input" id="reset-password" name="password" type="password"
               maxlength="72" autocomplete="new-password"
               placeholder="Min. 10 chars, mixed case, number &amp; symbol">
      </div>
      <div class="form-group">
        <label class="label" for="reset-confirm">Confirm password</label>
        <input class="input" id="reset-confirm" name="confirm" type="password"
               maxlength="72" autocomplete="new-password">
      </div>
      <button class="btn btn-primary btn-full" id="reset-submit" type="submit">Update password</button>
    </form>

    <div class="auth-footer">
      <span>Remembered it?</span>
      <a class="link-button" href="/">Sign in</a>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/reset_password.js" defer></script>
{% endblock %}
