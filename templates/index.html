<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow — CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #0b1520;
            --surface:     #111e2d;
            --surface2:    #172438;
            --border:      #1e3249;
            --border-hi:   #2a4560;

            --accent:      #00c2a8;
            --accent-dim:  rgba(0,194,168,0.08);
            --accent-glow: rgba(0,194,168,0.18);

            --amber:       #f5a623;
            --amber-dim:   rgba(245,166,35,0.08);
            --violet:      #9b6dff;
            --violet-dim:  rgba(155,109,255,0.08);
            --rose:        #ff5b79;
            --rose-dim:    rgba(255,91,121,0.08);

            --text:        #d8e8f5;
            --text-muted:  #567a96;
            --text-subtle: #2e4d66;

            --radius:      10px;
            --radius-sm:   7px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .shell { display: flex; flex-direction: column; min-height: 100vh; }

        /* ── HEADER ── */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px; height: 54px;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            background: rgba(11,21,32,0.95);
            backdrop-filter: blur(12px);
        }
        .logo-mark { display: flex; align-items: center; gap: 9px; }
        .logo-icon {
            width: 28px; height: 28px; background: var(--accent);
            border-radius: 7px; display: flex; align-items: center; justify-content: center;
            font-size: 13px;
        }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.5px; }
        .logo-text em { color: var(--accent); font-style: normal; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .user-chip {
            font-size: 12px; color: var(--text-muted);
            padding: 4px 12px; border-radius: 20px;
            border: 1px solid var(--border);
        }
        .btn-logout {
            font-size: 12px; color: var(--text-muted);
            background: transparent; border: 1px solid transparent;
            padding: 4px 10px; border-radius: 20px;
            cursor: pointer; font-family: 'Lato', sans-serif;
            transition: color 0.15s;
        }
        .btn-logout:hover { color: var(--rose); }

        .main { flex: 1; padding: 28px 28px 60px; max-width: 1360px; margin: 0 auto; width: 100%; }

        /* ── AUTH ── */
        #auth-wrap {
            display: flex; justify-content: center; align-items: center;
            min-height: calc(100vh - 54px); padding: 20px;
        }
        .auth-card {
            width: 100%; max-width: 340px;
            animation: fadeUp 0.3s ease;
        }
        .auth-eyebrow {
            font-size: 10px; font-weight: 700; color: var(--accent);
            letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px;
        }
        .auth-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
            margin-bottom: 32px; color: var(--text);
        }
        .form-group { margin-bottom: 14px; }
        label {
            font-size: 11px; color: var(--text-muted); font-weight: 700;
            display: block; margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase;
        }

        /* ── INPUTS ── */
        input, textarea, select {
            width: 100%; padding: 10px 0;
            background: transparent;
            border: none; border-bottom: 1px solid var(--border);
            color: var(--text); font-family: 'Lato', sans-serif; font-size: 14px;
            transition: border-color 0.15s;
            outline: none; appearance: none; border-radius: 0;
        }
        input:focus, textarea:focus, select:focus { border-bottom-color: var(--accent); }
        select option { background: var(--surface2); }
        ::placeholder { color: var(--text-subtle); }

        .app-form input, .app-form textarea, .app-form select {
            padding: 9px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .app-form input:focus, .app-form textarea:focus, .app-form select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        textarea { resize: vertical; min-height: 68px; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; border-radius: var(--radius-sm); border: none;
            font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover:not(:disabled) { opacity: 0.85; }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover:not(:disabled) { border-color: var(--border-hi); color: var(--text); }
        .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }
        .btn-danger { background: var(--rose-dim);   color: var(--rose);   border: 1px solid rgba(255,91,121,0.2); }
        .btn-info   { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,194,168,0.2); }
        .btn-edit   { background: var(--violet-dim); color: var(--violet); border: 1px solid rgba(155,109,255,0.2); }
        .btn-danger:hover { opacity: 0.8; }
        .btn-info:hover   { opacity: 0.8; }
        .btn-edit:hover   { opacity: 0.8; }

        .auth-row { display: flex; gap: 8px; margin-top: 28px; }
        .auth-row .btn { flex: 1; justify-content: center; }
        .auth-row .btn-ghost { border-color: var(--border); }

        /* ── STATS BAR ── */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-tile {
            padding: 18px 20px;
            border-left: 3px solid var(--tile-accent, var(--accent));
            background: var(--surface);
            border-radius: var(--radius);
        }
        .stat-tile.t-accent { --tile-accent: var(--accent); }
        .stat-tile.t-amber  { --tile-accent: var(--amber);  }
        .stat-tile.t-violet { --tile-accent: var(--violet); }
        .stat-tile.t-rose   { --tile-accent: var(--rose);   }
        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 5px;
        }
        .t-accent .stat-num { color: var(--accent); }
        .t-amber  .stat-num { color: var(--amber);  }
        .t-violet .stat-num { color: var(--violet); }
        .t-rose   .stat-num { color: var(--rose);   }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
        .stat-sub   { font-size: 11px; color: var(--text-subtle); margin-top: 2px; }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px; margin-bottom: 16px;
        }
        .toolbar-right { display: flex; gap: 8px; flex-wrap: wrap; }
        .view-pills {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 8px; padding: 3px; gap: 2px;
        }
        .pill {
            background: transparent; border: none; color: var(--text-muted);
            font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
            padding: 5px 13px; border-radius: 5px; cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .pill.active { background: var(--surface2); color: var(--text); }
        .filter-select {
            width: auto; min-width: 130px; padding: 6px 10px; font-size: 13px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            outline: none; appearance: none; cursor: pointer;
        }

        /* ── ADD PANEL ── */
        .add-panel {
            background: var(--surface);
            border-top: 2px solid var(--accent);
            border-radius: var(--radius); padding: 20px 22px; margin-bottom: 20px;
        }
        .panel-title {
            font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-muted); margin-bottom: 14px;
        }
        .add-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .add-grid-wide { grid-column: span 2; }

        /* ── REMINDERS ── */
        .reminder-strip {
            border-left: 3px solid var(--amber);
            border-radius: var(--radius); padding: 13px 16px; margin-bottom: 16px;
            background: var(--amber-dim);
        }
        .reminder-strip h4 {
            font-size: 11px; font-weight: 700; color: var(--amber);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px;
        }
        .reminder-strip li { font-size: 13px; color: var(--text-muted); margin-left: 16px; margin-top: 3px; line-height: 1.5; }
        .reminder-strip strong { color: var(--text); }

        /* ── LEAD CARD ── */
        .lead-card {
            background: var(--surface);
            border-radius: var(--radius); padding: 15px 17px; margin-bottom: 8px;
            display: flex; align-items: flex-start; gap: 14px;
            border-left: 3px solid transparent;
            transition: border-color 0.15s, background 0.15s, transform 0.15s;
            animation: fadeUp 0.2s ease;
        }
        .lead-card:hover {
            background: var(--surface2);
            border-left-color: var(--accent);
            transform: translateX(2px);
        }
        .lead-card.removing {
            opacity: 0; transform: translateX(-12px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .lead-main { flex: 1; min-width: 0; }
        .lead-name   { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 15px; }
        .lead-source { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .lead-meta   { display: flex; align-items: center; gap: 8px; margin-top: 9px; flex-wrap: wrap; }
        .lead-message {
            font-size: 12px; color: var(--text-muted); margin-top: 8px;
            line-height: 1.55; padding-top: 8px; border-top: 1px solid var(--border);
            white-space: pre-wrap;
        }
        .lead-notes  { font-size: 12px; color: var(--text-subtle); margin-top: 5px; font-style: italic; }
        .lead-date   { font-size: 11px; color: var(--text-subtle); font-variant-numeric: tabular-nums; }

        .badge {
            font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .badge-New       { background: var(--accent-dim); color: var(--accent); }
        .badge-Contacted { background: var(--amber-dim);  color: var(--amber);  }
        .badge-Qualified { background: var(--violet-dim); color: var(--violet); }
        .badge-Closed    { background: rgba(80,100,120,0.12); color: var(--text-muted); }

        .source-tag {
            font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 4px;
            text-transform: uppercase; letter-spacing: 0.05em;
            background: var(--surface2); color: var(--text-muted);
        }

        .card-actions {
            display: flex; flex-direction: column; gap: 5px;
            flex-shrink: 0; opacity: 0; transition: opacity 0.15s;
        }
        .lead-card:hover .card-actions { opacity: 1; }

        .followup-box {
            margin-top: 10px; font-size: 12px;
            line-height: 1.65; white-space: pre-wrap;
            border-left: 2px solid var(--accent);
            padding: 10px 12px; color: var(--text-muted); display: none;
            background: var(--accent-dim); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        .followup-box.open { display: block; animation: fadeUp 0.2s ease; }
        .followup-typing::after { content: '▋'; animation: blink 0.8s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* ── KANBAN ── */
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items: start; }
        .k-col {
            background: var(--surface);
            border-radius: var(--radius); min-height: 220px;
            border-top: 2px solid var(--border);
            transition: border-color 0.15s;
        }
        .k-col.col-New       { border-top-color: var(--accent); }
        .k-col.col-Contacted { border-top-color: var(--amber);  }
        .k-col.col-Qualified { border-top-color: var(--violet); }
        .k-col.col-Closed    { border-top-color: var(--text-subtle); }
        .k-col.over { background: var(--surface2); }
        .k-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 13px; border-bottom: 1px solid var(--border);
        }
        .k-label {
            display: flex; align-items: center; gap: 6px;
            font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .k-dot { width: 6px; height: 6px; border-radius: 50%; }
        .k-count {
            font-size: 11px; color: var(--text-muted);
            background: var(--surface2);
            padding: 1px 8px; border-radius: 20px;
        }
        .k-col.col-New       .k-label { color: var(--accent); }
        .k-col.col-New       .k-dot   { background: var(--accent); }
        .k-col.col-Contacted .k-label { color: var(--amber); }
        .k-col.col-Contacted .k-dot   { background: var(--amber); }
        .k-col.col-Qualified .k-label { color: var(--violet); }
        .k-col.col-Qualified .k-dot   { background: var(--violet); }
        .k-col.col-Closed    .k-label { color: var(--text-muted); }
        .k-col.col-Closed    .k-dot   { background: var(--text-muted); }
        .k-cards { padding: 10px; min-height: 80px; }
        .k-card {
            background: var(--surface2);
            border-radius: var(--radius-sm); padding: 12px 13px; margin-bottom: 7px;
            cursor: grab; user-select: none;
            transition: transform 0.15s, background 0.15s;
            border-left: 2px solid transparent;
        }
        .k-card:hover { transform: translateY(-1px); background: var(--border); }
        .k-card.dragging { opacity: 0.25; cursor: grabbing; }
        .k-card-name   { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; }
        .k-card-source { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
        .k-card-snippet { font-size: 11px; color: var(--text-subtle); margin-top: 5px; line-height: 1.45; }
        .k-card-date   { font-size: 10px; color: var(--text-subtle); margin-top: 8px; }
        .k-empty       { font-size: 12px; color: var(--text-subtle); text-align: center; padding: 24px 10px; }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; padding: 20px;
        }
        .modal-card {
            background: var(--surface);
            border-top: 2px solid var(--accent);
            border-radius: var(--radius); padding: 26px 26px 22px;
            width: 100%; max-width: 500px; animation: fadeUp 0.22s ease;
        }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 18px; }
        .modal-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .modal-footer { display: flex; gap: 8px; margin-top: 16px; }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 22px; right: 22px; z-index: 300;
            background: var(--surface2);
            border-radius: 8px; padding: 11px 16px;
            font-size: 13px; font-weight: 700;
            border-left: 3px solid var(--accent);
            transform: translateY(50px); opacity: 0;
            transition: transform 0.22s ease, opacity 0.22s ease;
            pointer-events: none;
        }
        #toast.show  { transform: translateY(0); opacity: 1; }
        #toast.t-ok  { border-left-color: var(--accent); color: var(--accent); }
        #toast.t-err { border-left-color: var(--rose);   color: var(--rose); }

        /* ── UTIL ── */
        .hidden { display: none !important; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } .board { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 800px)  { .add-grid { grid-template-columns: 1fr 1fr; } .add-grid-wide { grid-column: span 2; } .modal-grid { grid-template-columns: 1fr; } }
        @media (max-width: 600px)  { .board { grid-template-columns: 1fr; } .add-grid { grid-template-columns: 1fr; } .add-grid-wide { grid-column: span 1; } .card-actions { opacity: 1; } .stats-bar { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="shell">

    <!-- HEADER -->
    <header class="header">
        <div class="logo-mark">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">Lead<em>Flow</em></div>
        </div>
        <div class="header-right" id="header-user" style="display:none;">
            <span class="user-chip" id="username-display"></span>
            <button class="btn-logout" onclick="logout()">Sign out</button>
        </div>
    </header>

    <!-- AUTH -->
    <div id="auth-wrap">
        <div class="auth-card">
            <div class="auth-eyebrow">CRM Dashboard</div>
            <div class="auth-title">Welcome back 👋</div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="auth-user" placeholder="your username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="auth-pass" placeholder="your password" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <div class="auth-row">
                <button class="btn btn-ghost" id="btn-signup" onclick="doSignup()">Create Account</button>
                <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Sign In →</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <main class="main hidden" id="app">

        <!-- ADD LEAD -->
        <div class="add-panel app-form">
            <div class="panel-title">+ New Lead</div>
            <div class="add-grid">
                <input type="text" id="f-name"    placeholder="Contact Name *" class="add-grid-wide">
                <input type="text" id="f-source"  placeholder="Source  (e.g. Referral, Website)">
                <select id="f-status">
                    <option value="New">New</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Qualified">Qualified</option>
                    <option value="Closed">Closed</option>
                </select>
                <textarea id="f-message" placeholder="Initial message / inquiry…" style="margin:0;" class="add-grid-wide"></textarea>
                <textarea id="f-notes"   placeholder="Internal notes…" style="margin:0;" class="add-grid-wide"></textarea>
            </div>
            <button class="btn btn-primary" onclick="addLead()">Add Lead</button>
        </div>

        <!-- STATS -->
        <div class="stats-bar">
            <div class="stat-tile t-accent">
                <div class="stat-num" id="s-total">—</div>
                <div class="stat-label">Total Leads</div>
                <div class="stat-sub" id="s-week">—</div>
            </div>
            <div class="stat-tile t-amber">
                <div class="stat-num" id="s-new">—</div>
                <div class="stat-label">New</div>
                <div class="stat-sub">awaiting contact</div>
            </div>
            <div class="stat-tile t-violet">
                <div class="stat-num" id="s-qualified">—</div>
                <div class="stat-label">Qualified</div>
                <div class="stat-sub">ready to close</div>
            </div>
            <div class="stat-tile t-rose">
                <div class="stat-num" id="s-conversion">—</div>
                <div class="stat-label">Closed Rate</div>
                <div class="stat-sub">of total leads</div>
            </div>
        </div>

        <!-- REMINDERS -->
        <div id="reminder-strip" class="reminder-strip hidden">
            <h4>⚠ Follow-up Reminders</h4>
            <ul id="reminder-items"></ul>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="view-pills">
                <button class="pill active" id="pill-list"   onclick="switchView('list')">☰ List</button>
                <button class="pill"         id="pill-kanban" onclick="switchView('kanban')">⊞ Board</button>
            </div>
            <div class="toolbar-right" id="list-filters">
                <select class="filter-select" id="flt-status" onchange="renderList()">
                    <option value="All">All Statuses</option>
                    <option value="New">New</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Qualified">Qualified</option>
                    <option value="Closed">Closed</option>
                </select>
                <select class="filter-select" id="flt-sort" onchange="renderList()">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                </select>
            </div>
        </div>

        <!-- LIST VIEW -->
        <div id="list-view"></div>

        <!-- KANBAN VIEW -->
        <div id="kanban-view" class="hidden">
            <div class="board">
                <div class="k-col col-New" id="col-New"
                     ondragover="onOver(event)" ondragleave="onLeave(event)" ondrop="onDrop(event,'New')">
                    <div class="k-header">
                        <div class="k-label"><span class="k-dot"></span> New</div>
                        <span class="k-count" id="kc-New">0</span>
                    </div>
                    <div class="k-cards" id="kk-New"></div>
                </div>
                <div class="k-col col-Contacted" id="col-Contacted"
                     ondragover="onOver(event)" ondragleave="onLeave(event)" ondrop="onDrop(event,'Contacted')">
                    <div class="k-header">
                        <div class="k-label"><span class="k-dot"></span> Contacted</div>
                        <span class="k-count" id="kc-Contacted">0</span>
                    </div>
                    <div class="k-cards" id="kk-Contacted"></div>
                </div>
                <div class="k-col col-Qualified" id="col-Qualified"
                     ondragover="onOver(event)" ondragleave="onLeave(event)" ondrop="onDrop(event,'Qualified')">
                    <div class="k-header">
                        <div class="k-label"><span class="k-dot"></span> Qualified</div>
                        <span class="k-count" id="kc-Qualified">0</span>
                    </div>
                    <div class="k-cards" id="kk-Qualified"></div>
                </div>
                <div class="k-col col-Closed" id="col-Closed"
                     ondragover="onOver(event)" ondragleave="onLeave(event)" ondrop="onDrop(event,'Closed')">
                    <div class="k-header">
                        <div class="k-label"><span class="k-dot"></span> Closed</div>
                        <span class="k-count" id="kc-Closed">0</span>
                    </div>
                    <div class="k-cards" id="kk-Closed"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="edit-modal">
    <div class="modal-card app-form">
        <div class="modal-title">Edit Lead</div>
        <input type="hidden" id="e-id">
        <div class="modal-grid">
            <input type="text"  id="e-name"    placeholder="Contact Name">
            <input type="text"  id="e-source"  placeholder="Source">
            <select id="e-status">
                <option value="New">New</option>
                <option value="Contacted">Contacted</option>
                <option value="Qualified">Qualified</option>
                <option value="Closed">Closed</option>
            </select>
            <div></div>
            <textarea id="e-message" placeholder="Message / Inquiry" style="margin:0;"></textarea>
            <textarea id="e-notes"   placeholder="Internal Notes"    style="margin:0;"></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
            <button class="btn btn-ghost"   onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
let leads       = [];
let view        = 'list';
let dragId      = null;
let currentUser = '';
let nextTempId  = -1;

function esc(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}
function fmt(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtShort(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

let toastTimer = null;
function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show t-${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

/* ── AUTH ── */
async function doLogin() {
    const u = document.getElementById('auth-user').value.trim();
    const p = document.getElementById('auth-pass').value.trim();
    if (!u || !p) return toast('Please enter your username and password.', 'err');

    const btn = document.getElementById('btn-login');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    try {
        const res  = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (res.ok) { currentUser = u; enterApp(); }
        else toast(data.error || 'Login failed.', 'err');
    } catch {
        toast('Could not reach server.', 'err');
    } finally {
        btn.textContent = 'Sign In →';
        btn.disabled = false;
    }
}

async function doSignup() {
    const u = document.getElementById('auth-user').value.trim();
    const p = document.getElementById('auth-pass').value.trim();
    if (!u || !p) return toast('Please enter a username and password.', 'err');

    const btn = document.getElementById('btn-signup');
    btn.textContent = 'Creating…';
    btn.disabled = true;

    try {
        const res  = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (res.ok) toast('Account created! You can now sign in.');
        else toast(data.error || 'Signup failed.', 'err');
    } catch {
        toast('Could not reach server.', 'err');
    } finally {
        btn.textContent = 'Create Account';
        btn.disabled = false;
    }
}

function enterApp() {
    document.getElementById('auth-wrap').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('header-user').style.display = 'flex';
    document.getElementById('username-display').textContent = currentUser;
    loadLeads();
}

async function logout() {
    try { await fetch('/logout', { method: 'POST', credentials: 'include' }); } catch {}
    currentUser = '';
    leads = [];
    document.getElementById('auth-wrap').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    document.getElementById('header-user').style.display = 'none';
    document.getElementById('auth-user').value = '';
    document.getElementById('auth-pass').value = '';
}

/* ── SESSION CHECK ── */
async function checkSession() {
    try {
        const res = await fetch('/me', { credentials: 'include' });
        if (res.ok) {
            const data = await res.json();
            currentUser = data.username;
            enterApp();
        }
    } catch {}
}

/* ── DATA ── */
async function loadLeads() {
    try {
        const res  = await fetch('/leads', { credentials: 'include' });
        const data = await res.json();
        if (res.ok) {
            leads = data.leads || [];
            renderStats();
            view === 'list' ? renderList() : renderKanban();
            loadReminders();
        } else {
            toast(data.error || 'Failed to load leads.', 'err');
        }
    } catch (e) {
        console.error('loadLeads error:', e);
        toast('Could not reach server.', 'err');
    }
}

async function addLead() {
    const name    = document.getElementById('f-name').value.trim();
    const source  = document.getElementById('f-source').value.trim();
    const message = document.getElementById('f-message').value.trim();
    const status  = document.getElementById('f-status').value;
    const notes   = document.getElementById('f-notes').value.trim();
    if (!name) return toast('Please enter a contact name.', 'err');

    const tempId   = nextTempId--;
    const tempLead = { id: tempId, name, source, message, status, notes, created_at: new Date().toISOString() };
    leads.unshift(tempLead);
    renderStats(); renderList();
    ['f-name','f-source','f-message','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-status').value = 'New';
    toast('Lead added ✓');

    try {
        const res = await fetch('/add-lead', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ name, source, message, status, notes })
        });
        if (res.ok) {
            await loadLeads();
        } else {
            leads = leads.filter(l => l.id !== tempId);
            renderStats(); renderList();
            const d = await res.json();
            toast(d.error || 'Failed to add lead.', 'err');
        }
    } catch {
        leads = leads.filter(l => l.id !== tempId);
        renderStats(); renderList();
        toast('Could not reach server.', 'err');
    }
}

async function deleteLead(id) {
  if (!confirm('Remove this lead? This cannot be undone.')) return;

  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('removing');
    await new Promise(r => setTimeout(r, 180));
  }

  const backup = [...leads];
  leads = leads.filter(l => String(l.id) !== String(id));
  renderStats(); renderList();
  toast('Lead removed.');

  try {
    const res = await fetch('/remove-lead', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ id })
    });

    if (res.ok) {
      await loadLeads(); // pull fresh state from DB
      return;
    }

    const errData = await res.json().catch(() => ({}));
    console.error('Delete failed — server said:', res.status, errData);
    leads = backup; renderStats(); renderList();
    toast(`Delete failed — ${errData.error || 'server error'} (${res.status})`, 'err');
  } catch (e) {
    console.error('Delete network error:', e);
    leads = backup; renderStats(); renderList();
    toast('Could not reach server.', 'err');
  }
}

/* ── STATS ── */
function renderStats() {
    const total     = leads.length;
    const newCount  = leads.filter(l => l.status === 'New').length;
    const qualified = leads.filter(l => l.status === 'Qualified').length;
    const closed    = leads.filter(l => l.status === 'Closed').length;
    const rate      = total === 0 ? '0' : ((closed / total) * 100).toFixed(1);
    const weekAgo   = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
    const weekly    = leads.filter(l => l.created_at && new Date(l.created_at) >= weekAgo).length;

    document.getElementById('s-total').textContent      = total;
    document.getElementById('s-week').textContent       = `+${weekly} this week`;
    document.getElementById('s-new').textContent        = newCount;
    document.getElementById('s-qualified').textContent  = qualified;
    document.getElementById('s-conversion').textContent = rate + '%';
}

/* ── REMINDERS ── */
async function loadReminders() {
    try {
        const res  = await fetch('/reminders', { credentials: 'include' });
        const data = await res.json();
        const strip = document.getElementById('reminder-strip');
        const list  = document.getElementById('reminder-items');
        if (res.ok && data.reminders?.length > 0) {
            strip.classList.remove('hidden');
            list.innerHTML = data.reminders.map(r =>
                `<li>No contact yet with <strong>${esc(r.name)}</strong> — came in via <em>${esc(r.source || 'unknown')}</em> over 7 days ago.</li>`
            ).join('');
        } else {
            strip.classList.add('hidden');
        }
    } catch (e) { console.error(e); }
}

/* ── VIEW TOGGLE ── */
function switchView(v) {
    view = v;
    document.getElementById('pill-list').classList.toggle('active', v === 'list');
    document.getElementById('pill-kanban').classList.toggle('active', v === 'kanban');
    document.getElementById('list-filters').style.display = v === 'list' ? 'flex' : 'none';
    document.getElementById('list-view').classList.toggle('hidden', v !== 'list');
    document.getElementById('kanban-view').classList.toggle('hidden', v !== 'kanban');
    v === 'kanban' ? renderKanban() : renderList();
}

/* ── LIST VIEW ── */
function renderList() {
    const statusFilter = document.getElementById('flt-status').value;
    const sortDir      = document.getElementById('flt-sort').value;
    const container    = document.getElementById('list-view');

    let filtered = leads.filter(l => statusFilter === 'All' || l.status === statusFilter);
    filtered.sort((a, b) => sortDir === 'newest'
        ? new Date(b.created_at) - new Date(a.created_at)
        : new Date(a.created_at) - new Date(b.created_at));

    if (filtered.length === 0) {
        container.innerHTML = `<p style="text-align:center;color:var(--text-muted);padding:60px 0;font-size:14px;">No leads found. Add your first lead above.</p>`;
        return;
    }

    container.innerHTML = filtered.map(l => {
        const snippet = l.message ? (l.message.length > 120 ? l.message.slice(0, 120) + '…' : l.message) : '';
        return `
        <div class="lead-card" id="card-${l.id}">
            <div class="lead-main">
                <div class="lead-name">${esc(l.name)}</div>
                <div class="lead-source">${esc(l.source || 'Unknown source')}</div>
                <div class="lead-meta">
                    <span class="badge badge-${esc(l.status)}">${esc(l.status)}</span>
                    <span class="source-tag">${esc(l.source || '?')}</span>
                    <span class="lead-date">${fmt(l.created_at)}</span>
                </div>
                ${snippet ? `<div class="lead-message">${esc(snippet)}</div>` : ''}
                ${l.notes ? `<div class="lead-notes">📝 ${esc(l.notes)}</div>` : ''}
                <div id="fu-${l.id}" class="followup-box"></div>
            </div>
            <div class="card-actions">
                <button class="btn btn-sm btn-info"   onclick="genFollowUp(${l.id})">✉ Follow-up</button>
                <button class="btn btn-sm btn-edit"   onclick="openEdit(${l.id})">✎ Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteLead(${l.id})">✕ Delete</button>
            </div>
        </div>`;
    }).join('');
}

/* ── KANBAN ── */
function renderKanban() {
    ['New','Contacted','Qualified','Closed'].forEach(status => {
        const cards   = leads.filter(l => l.status === status);
        const col     = document.getElementById(`kk-${status}`);
        const counter = document.getElementById(`kc-${status}`);
        counter.textContent = cards.length;
        col.innerHTML = cards.length === 0
            ? `<p class="k-empty">Drop leads here</p>`
            : cards.map(l => {
                const snippet = l.message ? (l.message.length > 60 ? l.message.slice(0,60)+'…' : l.message) : '';
                return `
                <div class="k-card" draggable="true"
                     ondragstart="dragStart(event,${l.id})"
                     ondragend="dragEnd(event)">
                    <div class="k-card-name">${esc(l.name)}</div>
                    <div class="k-card-source">${esc(l.source || '—')}</div>
                    ${snippet ? `<div class="k-card-snippet">${esc(snippet)}</div>` : ''}
                    <div class="k-card-date">${fmtShort(l.created_at)}</div>
                </div>`;
            }).join('');
    });
}

/* ── DRAG & DROP ── */
function dragStart(e, id) {
    dragId = id;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
}
function dragEnd(e) {
    e.target.classList.remove('dragging');
    document.querySelectorAll('.k-col').forEach(c => c.classList.remove('over'));
}
function onOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('over'); }
function onLeave(e) { e.currentTarget.classList.remove('over'); }

async function onDrop(e, newStatus) {
    e.preventDefault();
    e.currentTarget.classList.remove('over');
    if (!dragId) return;
    const lead = leads.find(l => l.id === dragId);
    if (!lead || lead.status === newStatus) return;

    const oldStatus = lead.status;
    lead.status = newStatus;
    renderKanban(); renderStats();
    toast(`Moved to ${newStatus}`);

    try {
        const res = await fetch('/update-lead', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                id: lead.id, name: lead.name, source: lead.source || '',
                message: lead.message || '', status: newStatus, notes: lead.notes || ''
            })
        });
        if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            console.error('Kanban update failed:', res.status, errData);
            lead.status = oldStatus;
            renderKanban(); renderStats();
            toast('Update failed — reverted.', 'err');
        }
    } catch (e) {
        console.error('Kanban drop network error:', e);
        lead.status = oldStatus;
        renderKanban(); renderStats();
        toast('Could not reach server.', 'err');
    }
    dragId = null;
}

/* ── FOLLOW-UP GENERATOR ── */
async function genFollowUp(id) {
    const lead = leads.find(l => l.id === id);
    if (!lead) return;
    const box = document.getElementById(`fu-${id}`);
    if (!box) return;
    box.textContent = 'Generating…';
    box.classList.add('open', 'followup-typing');
    try {
        const res  = await fetch('/generate-followup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ name: lead.name, message: lead.message || '' })
        });
        const data = await res.json();
        box.classList.remove('followup-typing');
        box.textContent = data.followup_text || (data.error || 'Could not generate follow-up.');
    } catch {
        box.classList.remove('followup-typing');
        box.textContent = 'Error: could not reach server.';
    }
}

/* ── EDIT MODAL ── */
function openEdit(id) {
    const l = leads.find(l => l.id === id);
    if (!l) return;
    document.getElementById('e-id').value      = l.id;
    document.getElementById('e-name').value    = l.name    || '';
    document.getElementById('e-source').value  = l.source  || '';
    document.getElementById('e-message').value = l.message || '';
    document.getElementById('e-status').value  = l.status  || 'New';
    document.getElementById('e-notes').value   = l.notes   || '';
    document.getElementById('edit-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

async function saveEdit() {
    const payload = {
        id:      document.getElementById('e-id').value,
        name:    document.getElementById('e-name').value.trim(),
        source:  document.getElementById('e-source').value.trim(),
        message: document.getElementById('e-message').value.trim(),
        status:  document.getElementById('e-status').value,
        notes:   document.getElementById('e-notes').value.trim()
    };
    if (!payload.name) return toast('Name is required.', 'err');

    const idx    = leads.findIndex(l => String(l.id) === String(payload.id));
    const backup = idx >= 0 ? { ...leads[idx] } : null;
    if (idx >= 0) Object.assign(leads[idx], payload);
    closeModal();
    renderStats(); renderList();
    toast('Lead updated ✓');

    try {
        const res = await fetch('/update-lead', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(payload)
        });
        if (!res.ok) {
            if (backup && idx >= 0) Object.assign(leads[idx], backup);
            renderStats(); renderList();
            const d = await res.json();
            toast(d.error || 'Update failed.', 'err');
        }
    } catch {
        if (backup && idx >= 0) Object.assign(leads[idx], backup);
        renderStats(); renderList();
        toast('Could not reach server.', 'err');
    }
}

document.getElementById('edit-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
});

checkSession();
</script>
</body>
</html>
